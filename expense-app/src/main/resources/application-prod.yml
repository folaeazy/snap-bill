server:
  port:  ${PORT}

baseUrl : ${BASE_URL}

encryption :
  token:
    secret: ${ENCRYPTION_SECRET}

snapbill :
  sync :
    cron: 0 0 */6 * * *
  # For production (every 6 hours)

  llm :
    api-key : ${LLM_KEY}

  google :
    client :
      id : ${GOOGLE_ID}
      secret : ${GOOGLE_SECRET}



spring:
  application:
    name: snap bill-engine

  config:
    activate:
      on-profile: prod

  # Database (PostgreSQL)
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password:   ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Use Flyway for schema, not auto-DDL
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway migrations (optional but strongly recommended)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Virtual threads (from phase 2/3)
  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${YOUR_GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email,https://www.googleapis.com/auth/gmail.readonly
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-name: Google

          microsoft:
            client-id: ${YOUR_MICROSOFT_CLIENT_ID}
            client-secret: ${YOUR_MICROSOFT_CLIENT_SECRET}
            scope: openid,profile,email,offline_access,https://graph.microsoft.com/Mail.Read
            redirect-uri: "{baseUrl}/login/oauth2/code/microsoft"
            client-name: Microsoft
            authorization-grant-type: authorization_code
            provider: microsoft

        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-name-attribute: sub

# JWT config
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXP}